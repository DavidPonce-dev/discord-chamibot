<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Charmin Charmeleon — Admin</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, sans-serif;
        background: #0f0f0f;
        color: #e0e0e0;
        min-height: 100vh;
        padding: 2rem;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
        color: #fff;
      }
      h2 {
        font-size: 1.1rem;
        margin: 1.5rem 0 0.5rem;
        color: #aaa;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      h2 svg {
        flex-shrink: 0;
      }
      .card {
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 8px;
        padding: 1.5rem;
        margin-bottom: 1rem;
      }
      .btn {
        background: #5865f2;
        color: #fff;
        border: none;
        padding: 0.6rem 1.2rem;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.9rem;
        margin-right: 0.5rem;
        margin-bottom: 0.5rem;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
      }
      .btn:hover {
        background: #4752c4;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn.danger {
        background: #ed4245;
      }
      .btn.danger:hover {
        background: #c23b3e;
      }
      .btn.success {
        background: #2d7d46;
      }
      .btn.success:hover {
        background: #236b3a;
      }
      .btn.warning {
        background: #d4a017;
      }
      .btn.warning:hover {
        background: #b8890f;
      }
      .btn svg {
        flex-shrink: 0;
      }
      pre {
        background: #111;
        padding: 1rem;
        border-radius: 6px;
        overflow-x: auto;
        font-size: 0.85rem;
        margin-top: 0.5rem;
      }
      .status {
        display: inline-block;
        padding: 0.2rem 0.6rem;
        border-radius: 4px;
        font-size: 0.8rem;
        font-weight: 600;
      }
      .status.ok {
        background: #2d7d46;
        color: #57f287;
      }
      .status.warn {
        background: #7d6b2d;
        color: #f2a557;
      }
      .status.err {
        background: #7d2d2d;
        color: #f25757;
      }
      #vnc-frame {
        width: 100%;
        height: 500px;
        border: 1px solid #333;
        border-radius: 6px;
        display: none;
      }
      .indicator {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-right: 6px;
      }
      .indicator.on {
        background: #57f287;
        box-shadow: 0 0 6px #57f287;
      }
      .indicator.off {
        background: #f25757;
      }
      .flag-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.4rem 0;
        border-bottom: 1px solid #222;
      }
      .flag-row:last-child {
        border-bottom: none;
      }
      .flag-label {
        color: #aaa;
        font-size: 0.85rem;
      }
      .flag-value {
        font-weight: 600;
        font-size: 0.85rem;
      }
      .flag-badge {
        display: inline-block;
        padding: 0.15rem 0.5rem;
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
      }
      .flag-badge.yes {
        background: #2d7d46;
        color: #57f287;
      }
      .flag-badge.no {
        background: #7d2d2d;
        color: #f25757;
      }
      .flag-badge.maybe {
        background: #7d6b2d;
        color: #f2a557;
      }
      .guild-card {
        background: #111;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 1rem;
        margin-bottom: 0.75rem;
      }
      .guild-card.active {
        border-color: #57f287;
      }
      .guild-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.5rem;
      }
      .guild-name {
        font-weight: 600;
        font-size: 0.95rem;
        color: #fff;
      }
      .guild-id {
        font-size: 0.75rem;
        color: #666;
      }
      .guild-info {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 0.5rem;
        font-size: 0.8rem;
      }
      .guild-info-item {
        display: flex;
        flex-direction: column;
      }
      .guild-info-label {
        color: #888;
        font-size: 0.7rem;
        text-transform: uppercase;
      }
      .guild-info-value {
        color: #e0e0e0;
        font-weight: 500;
      }
      .track-title {
        color: #57f287;
        font-weight: 600;
      }
      .deploy-bar {
        display: flex;
        align-items: center;
        gap: 1rem;
        flex-wrap: wrap;
      }
      .deploy-indicator {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.9rem;
      }
      .deploy-indicator .indicator {
        width: 14px;
        height: 14px;
      }
      .refresh-timer {
        font-size: 0.75rem;
        color: #666;
      }
      .no-guilds {
        color: #888;
        font-style: italic;
        padding: 1rem;
        text-align: center;
      }
      .last-updated {
        font-size: 0.75rem;
        color: #666;
        margin-left: auto;
      }
    </style>
  </head>
  <body>
    <h1>Charmin Charmeleon — Admin</h1>
    <p style="color: #888">Cookie management dashboard</p>

    <div class="card">
      <h2>
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="10" />
          <path
            d="M12 2a7 7 0 0 0-7 7c0 3 2 5 4 6.5V18a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2v-2.5c2-1.5 4-3.5 4-6.5a7 7 0 0 0-7-7z"
          />
        </svg>
        Cookie Status
      </h2>
      <div id="cookie-flags">Loading...</div>
    </div>

    <div class="card">
      <h2>
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="2" y="3" width="20" height="14" rx="2" />
          <line x1="8" y1="21" x2="16" y2="21" />
          <line x1="12" y1="17" x2="12" y2="21" />
        </svg>
        System Status
      </h2>
      <div id="system-status">Loading...</div>
    </div>

    <div class="card">
      <h2>
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        </svg>
        Bot Control
        <span class="last-updated" id="guilds-timer"></span>
      </h2>
      <div class="deploy-bar" style="margin-bottom: 1rem;">
        <div class="deploy-indicator" id="deploy-indicator">
          <span class="indicator on"></span>
          <span>Service Active</span>
        </div>
        <button class="btn danger" id="deploy-btn" onclick="toggleDeploy()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="6" y="6" width="12" height="12" rx="1" />
          </svg>
          Disable Service (Deploy)
        </button>
      </div>
      <div id="guilds-list">Loading...</div>
    </div>

    <div class="card">
      <h2>
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="10" />
          <line x1="2" y1="12" x2="22" y2="12" />
          <path
            d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"
          />
        </svg>
        Browser Control
      </h2>
      <div id="browser-status" style="margin-bottom: 1rem; color: #888">
        Unknown
      </div>
      <button class="btn success" onclick="startBrowser()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5,3 19,12 5,21" />
        </svg>
        Start Browser
      </button>
      <button class="btn warning" onclick="closeBrowserAction()">
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>
        Close & Extract
      </button>
      <button class="btn danger" onclick="forceResetProfile()">
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="23 4 23 10 17 10" />
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
        </svg>
        Force Reset
      </button>
    </div>

    <div class="card">
      <h2>
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="3" y="11" width="18" height="11" rx="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
        VNC Login Session
      </h2>
      <div id="vnc-status" style="margin-bottom: 1rem; color: #888">
        No active session
      </div>
      <button class="btn" onclick="startSetup()">
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="2" y="3" width="20" height="14" rx="2" />
          <line x1="8" y1="21" x2="16" y2="21" />
          <line x1="12" y1="17" x2="12" y2="21" />
        </svg>
        Start VNC
      </button>
      <button class="btn success" onclick="extractCookies()">
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"
          />
          <polyline points="17 21 17 13 7 13 7 21" />
          <polyline points="7 3 7 8 15 8" />
        </svg>
        Extract Cookies
      </button>
      <button class="btn danger" onclick="stopSetup()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="6" width="12" height="12" rx="1" />
        </svg>
        Stop VNC
      </button>
      <iframe id="vnc-frame"></iframe>
    </div>

    <div class="card">
      <h2>
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="23 4 23 10 17 10" />
          <polyline points="1 20 1 14 7 14" />
          <path
            d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"
          />
        </svg>
        Cookie Actions
      </h2>
      <button class="btn" onclick="refreshCookies()">
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="23 4 23 10 17 10" />
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
        </svg>
        Refresh (Headless)
      </button>
    </div>

    <div class="card">
      <h2>
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
          />
          <polyline points="14 2 14 8 20 8" />
          <line x1="16" y1="13" x2="8" y2="13" />
          <line x1="16" y1="17" x2="8" y2="17" />
        </svg>
        Log
      </h2>
      <pre id="log">Ready.</pre>
    </div>

    <script>
      const TOKEN =
        new URLSearchParams(window.location.search).get("token") || "";
      if (!TOKEN) {
        document.body.innerHTML =
          '<div style="text-align:center;padding:4rem"><h1 style="color:#f25757">403 \u2014 Access Denied</h1><p style="color:#888">Valid authentication required.</p></div>';
        throw new Error("No token");
      }
      const API = "/api";
      function apiFetch(path, opts) {
        const sep = path.includes("?") ? "&" : "?";
        return fetch(API + path + sep + "token=" + TOKEN, opts);
      }
      function log(msg) {
        const l = document.getElementById("log");
        l.textContent += msg + "\n";
        l.scrollTop = l.scrollHeight;
      }
      function badge(val) {
        return (
          '<span class="flag-badge ' +
          (val ? "yes" : "no") +
          '">' +
          (val ? "YES" : "NO") +
          "</span>"
        );
      }
      function updateCookieFlags(d) {
        const el = document.getElementById("cookie-flags");
        const ageStr = d.ageHours != null ? d.ageHours + "h ago" : "never";
        const validClass = d.cookiesValid ? "ok" : "err";
        const validText = d.cookiesValid ? "VALID" : "INVALID";
        el.innerHTML =
          '<div class="flag-row"><span class="flag-label">Overall</span><span class="status ' +
          validText.toLowerCase() +
          '">' +
          validText +
          "</span></div>" +
          '<div class="flag-row"><span class="flag-label">Count</span><span class="flag-value">' +
          d.cookieCount +
          " cookies</span></div>" +
          '<div class="flag-row"><span class="flag-label">Has PSID</span>' +
          badge(d.hasPSID) +
          "</div>" +
          '<div class="flag-row"><span class="flag-label">Has SID</span>' +
          badge(d.hasSID) +
          "</div>" +
          '<div class="flag-row"><span class="flag-label">Last Modified</span><span class="flag-value">' +
          (d.lastModified || "never") +
          "</span></div>" +
          '<div class="flag-row"><span class="flag-label">Age</span><span class="flag-value">' +
          ageStr +
          "</span></div>";
      }
      function updateIndicator(id, active, label) {
        const el = document.getElementById(id);
        el.innerHTML =
          '<span class="indicator ' +
          (active ? "on" : "off") +
          '"></span>' +
          (active ? label + " \u2014 Active" : label + " \u2014 Inactive");
      }
      async function checkStatus() {
        try {
          const r = await apiFetch("/status");
          const d = await r.json();
          updateCookieFlags(d);
          updateIndicator("system-status", d.cookiesValid, "Cookies");
          updateIndicator("browser-status", d.browserActive, "Browser");
          updateIndicator("vnc-status", d.vncActive, "VNC");
          log(
            "Status: cookies=" +
              (d.cookiesValid ? "valid" : "invalid") +
              " count=" +
              d.cookieCount +
              " browser=" +
              (d.browserActive ? "on" : "off") +
              " vnc=" +
              (d.vncActive ? "on" : "off"),
          );
        } catch (e) {
          log("Status check failed: " + e.message);
        }
      }
      async function startBrowser() {
        log("Starting headless browser...");
        try {
          const r = await apiFetch("/browser/start", { method: "POST" });
          const d = await r.json();
          if (d.error) {
            log("Error: " + d.error);
            return;
          }
          log("Browser started");
          checkStatus();
        } catch (e) {
          log("Start browser failed: " + e.message);
        }
      }
      async function closeBrowserAction() {
        log("Closing browser and extracting cookies...");
        try {
          const r = await apiFetch("/browser/close", { method: "POST" });
          const d = await r.json();
          if (d.error) {
            log("Error: " + d.error);
            return;
          }
          log("Browser closed. Result: " + JSON.stringify(d));
          checkStatus();
        } catch (e) {
          log("Close browser failed: " + e.message);
        }
      }
      async function forceResetProfile() {
        if (
          !confirm(
            "This will delete all browser data and require re-login. Continue?",
          )
        )
          return;
        log("Force resetting browser profile...");
        try {
          const r = await apiFetch("/profile/reset", { method: "POST" });
          const d = await r.json();
          if (d.error) {
            log("Error: " + d.error);
            return;
          }
          log("Profile reset \u2014 use VNC login to re-authenticate");
          checkStatus();
        } catch (e) {
          log("Force reset failed: " + e.message);
        }
      }
      async function refreshCookies() {
        log("Refreshing cookies...");
        try {
          const r = await apiFetch("/cookies/refresh", { method: "POST" });
          const d = await r.json();
          log("Result: " + JSON.stringify(d));
          checkStatus();
        } catch (e) {
          log("Refresh failed: " + e.message);
        }
      }
      async function extractCookies() {
        log("Extracting cookies from open browser...");
        try {
          const r = await apiFetch("/cookies/extract", { method: "POST" });
          const d = await r.json();
          log("Result: " + JSON.stringify(d));
          checkStatus();
        } catch (e) {
          log("Extract failed: " + e.message);
        }
      }
      async function startSetup() {
        log("Starting VNC login...");
        try {
          const r = await apiFetch("/cookies/setup", { method: "POST" });
          const d = await r.json();
          if (d.error) {
            log("Error: " + d.error);
            return;
          }
          document.getElementById("vnc-frame").src =
            "/vnc/vnc.html?autoconnect=true&path=/vnc/websockify&token=" +
            TOKEN;
          document.getElementById("vnc-frame").style.display = "block";
          log(
            "VNC started \u2014 login in the frame below, then use Extract Cookies button",
          );
          checkStatus();
        } catch (e) {
          log("Setup failed: " + e.message);
        }
      }
      async function stopSetup() {
        log("Stopping VNC...");
        try {
          await apiFetch("/cookies/setup/stop", { method: "POST" });
          document.getElementById("vnc-frame").style.display = "none";
          document.getElementById("vnc-frame").src = "";
          log("VNC stopped");
          checkStatus();
        } catch (e) {
          log("Stop failed: " + e.message);
        }
      }

      let guildsRefreshSec = 5;

      async function updateGuilds() {
        try {
          const r = await apiFetch("/guilds");
          const d = await r.json();
          renderGuilds(d);
          renderDeployIndicator(d.deployMode);
        } catch (e) {
          document.getElementById("guilds-list").innerHTML =
            '<div class="no-guilds">Error loading guilds: ' + e.message + "</div>";
        }
      }

      function renderDeployIndicator(deployMode) {
        const el = document.getElementById("deploy-indicator");
        const btn = document.getElementById("deploy-btn");
        if (deployMode) {
          el.innerHTML =
            '<span class="indicator off"></span><span>Service Disabled (Deploy Mode)</span>';
          btn.innerHTML =
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21" /></svg> Enable Service';
          btn.className = "btn success";
        } else {
          el.innerHTML =
            '<span class="indicator on"></span><span>Service Active</span>';
          btn.innerHTML =
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12" rx="1" /></svg> Disable Service (Deploy)';
          btn.className = "btn danger";
        }
      }

      function renderGuilds(data) {
        const el = document.getElementById("guilds-list");
        if (!data.guilds || data.guilds.length === 0) {
          el.innerHTML = '<div class="no-guilds">No servers found</div>';
          return;
        }

        let html = "";
        for (const g of data.guilds) {
          const m = g.music || {};
          const activeClass = m.connected ? "active" : "";
          html += '<div class="guild-card ' + activeClass + '">';
          html += '<div class="guild-header">';
          html += '<div><div class="guild-name">' + escapeHtml(g.name) + "</div>";
          html += '<div class="guild-id">' + g.id + " · " + g.memberCount + " members</div></div>";
          if (m.connected) {
            html += '<span class="status ok">CONNECTED</span>';
          } else {
            html += '<span class="status err">IDLE</span>';
          }
          html += "</div>";

          if (m.connected) {
            html += '<div class="guild-info">';
            html += '<div class="guild-info-item"><span class="guild-info-label">Voice Channel</span><span class="guild-info-value">' + escapeHtml(m.voiceChannel || "—") + "</span></div>";
            html += '<div class="guild-info-item"><span class="guild-info-label">Queue Size</span><span class="guild-info-value">' + m.queueSize + "</span></div>";
            html += '<div class="guild-info-item"><span class="guild-info-label">Autoplay</span><span class="guild-info-value">' + (m.autoplay ? "ON" : "OFF") + "</span></div>";
            html += '<div class="guild-info-item"><span class="guild-info-label">Loop</span><span class="guild-info-value">' + escapeHtml(m.loopMode || "none") + "</span></div>";
            html += '<div class="guild-info-item"><span class="guild-info-label">Paused</span><span class="guild-info-value">' + (m.isPaused ? "YES" : "NO") + "</span></div>";

            if (m.currentTrack) {
              const t = m.currentTrack;
              html += '<div class="guild-info-item" style="grid-column: span 2"><span class="guild-info-label">Now Playing</span><span class="guild-info-value track-title">' + escapeHtml(t.title) + "</span></div>";
              html += '<div class="guild-info-item"><span class="guild-info-label">Requested By</span><span class="guild-info-value">' + escapeHtml(t.requestedBy) + "</span></div>";
              html += '<div class="guild-info-item"><span class="guild-info-label">Position</span><span class="guild-info-value">' + formatTime(t.position) + " / " + escapeHtml(t.duration || "??:??") + "</span></div>";
            } else {
              html += '<div class="guild-info-item" style="grid-column: span 2"><span class="guild-info-label">Now Playing</span><span class="guild-info-value" style="color:#888">None</span></div>';
            }

            html += "</div>";
          }

          html += "</div>";
        }
        el.innerHTML = html;
      }

      async function toggleDeploy() {
        const btn = document.getElementById("deploy-btn");
        btn.disabled = true;
        try {
          const r = await apiFetch("/bot/toggle", { method: "POST" });
          const d = await r.json();
          log("Deploy toggle: " + d.message);
          renderDeployIndicator(d.deployMode);
          updateGuilds();
        } catch (e) {
          log("Toggle failed: " + e.message);
        } finally {
          btn.disabled = false;
        }
      }

      function escapeHtml(str) {
        if (!str) return "";
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function formatTime(seconds) {
        if (seconds == null) return "0:00";
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return m + ":" + (s < 10 ? "0" : "") + s;
      }

      function updateTimer() {
        guildsRefreshSec--;
        if (guildsRefreshSec <= 0) {
          guildsRefreshSec = 5;
          updateGuilds();
        }
        document.getElementById("guilds-timer").textContent = "Refreshing in " + guildsRefreshSec + "s";
      }

      checkStatus();
      updateGuilds();
      setInterval(checkStatus, 30000);
      setInterval(updateTimer, 1000);
    </script>
  </body>
</html>
