services:
  bot:
    build: .
    container_name: charmin-charmeleon-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - COOKIE_DIR=/cookies
      - BROWSER_PROFILE=/profile
      - COOKIE_REFRESH_INTERVAL_MS=43200000
    ports:
      - "127.0.0.1:6080:6080"
    volumes:
      - ./data/cookies:/cookies
      - ./data/browser-profile:/profile
