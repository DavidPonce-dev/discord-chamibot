services:
  bot:
    build: .
    container_name: charmin-charmeleon-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - COOKIE_DIR=/cookies
      - BROWSER_PROFILE=/profile
      - COOKIE_REFRESH_INTERVAL_MS=43200000
      - ADMIN_PORT=3002
    ports:
      - "3002:3002"
    volumes:
      - browser-profile:/profile
      - cookies:/cookies

volumes:
  browser-profile:
  cookies:
