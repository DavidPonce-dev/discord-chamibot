services:
  bot:
    build: .
    container_name: charmin-charmeleon-bot
    restart: unless-stopped
    env_file: .env
    environment:
      # Required
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - CLIENT_ID=${CLIENT_ID}
      # Admin Panel
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - ADMIN_ALLOWED_ORIGINS=${ADMIN_ALLOWED_ORIGINS}
      # Cookie Refresher
      - COOKIE_DIR=/cookies
      - BROWSER_PROFILE=/profile
      - COOKIE_REFRESH_INTERVAL_MS=43200000
      - YOUTUBE_COOKIES=${YOUTUBE_COOKIES:-}
      - COOKIE_REFRESHER_URL=${COOKIE_REFRESHER_URL:-}
    ports:
      - "3002:3002"
    volumes:
      - browser-profile:/profile
      - cookies:/cookies

volumes:
  browser-profile:
  cookies:
